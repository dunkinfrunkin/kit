services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: kit
      POSTGRES_USER: kit
      POSTGRES_PASSWORD: changeme
    volumes:
      - kit-db:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "8430:8430"
    environment:
      KIT_SECRET: change-me-to-a-real-secret
      DATABASE_URL: postgres://kit:changeme@db:5432/kit?sslmode=disable
    depends_on:
      - db

volumes:
  kit-db:
