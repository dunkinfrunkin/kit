name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build binaries
        run: |
          mkdir -p dist
          for os in darwin linux; do
            for arch in arm64 amd64; do
              GOOS=$os GOARCH=$arch go build -o dist/kit_${os}_${arch}/kit ./cmd/kit
              tar czf dist/kit_${os}_${arch}.tar.gz -C dist/kit_${os}_${arch} kit
            done
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            dist/kit_darwin_arm64.tar.gz \
            dist/kit_darwin_amd64.tar.gz \
            dist/kit_linux_arm64.tar.gz \
            dist/kit_linux_amd64.tar.gz \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/dunkinfrunkin/kit:${{ github.ref_name }}
            ghcr.io/dunkinfrunkin/kit:latest

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          SHA_DARWIN_ARM64=$(shasum -a 256 dist/kit_darwin_arm64.tar.gz | awk '{print $1}')
          SHA_DARWIN_AMD64=$(shasum -a 256 dist/kit_darwin_amd64.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM64=$(shasum -a 256 dist/kit_linux_arm64.tar.gz | awk '{print $1}')
          SHA_LINUX_AMD64=$(shasum -a 256 dist/kit_linux_amd64.tar.gz | awk '{print $1}')

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/dunkinfrunkin/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Formula/kit.rb << FORMULA
          class Kit < Formula
            desc "Share AI coding skills, hooks, and config across tools and teams"
            homepage "https://github.com/dunkinfrunkin/kit"
            version "${VERSION_NUM}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/dunkinfrunkin/kit/releases/download/v#{version}/kit_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/dunkinfrunkin/kit/releases/download/v#{version}/kit_darwin_amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/dunkinfrunkin/kit/releases/download/v#{version}/kit_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/dunkinfrunkin/kit/releases/download/v#{version}/kit_linux_amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "kit"
            end

            test do
              assert_match "kit", shell_output("#{bin}/kit --help")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/kit.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kit.rb
          git commit -m "Update kit to ${VERSION_NUM}"
          git push
